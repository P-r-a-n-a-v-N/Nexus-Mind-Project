version: "3.9"

services:
  # ── Pipeline worker ──────────────────────────────────────────────────────────
  nexusmind:
    build: .
    container_name: nexusmind-pipeline
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: nexusmind

  # ── Streamlit dashboard ──────────────────────────────────────────────────────
  dashboard:
    build: .
    container_name: nexusmind-ui
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    command: streamlit run src/nexusmind/ui.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - nexusmind
